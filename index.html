<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZ Lab – Android Apps</title>
<meta name="description" content="Explore all OZ Lab Android apps. Clean, minimal Android tools.">

<style>
:root{
  --accent:#F64C17;
  --bg:#f1f3f4;
  --card:#ffffff;
  --text:#202124;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#f5f5f5;
  }
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  background:white;
  padding:10px 20px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  position:sticky;
  top:0;
  z-index:1000;
}
@media (prefers-color-scheme: dark){
  header{background:#1e1e1e;}
}
header h1{font-size:18px;}
header p{font-size:12px;opacity:.7;margin-top:2px;}

/* TITLE */
.top-title{
  padding:14px 20px 6px;
  text-align:center;
}
.top-title h2{
  font-size:20px;
  font-weight:600;
}
.top-title p{
  font-size:13px;
  opacity:.6;
  margin-top:3px;
}

/* SEARCH */
.search{
  max-width:600px;
  margin:8px auto 10px;
}
.search input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #dadce0;
  font-size:14px;
}

/* FILTER */
.filter{
  text-align:center;
  margin-bottom:10px;
}
.filter button{
  margin:4px;
  padding:6px 14px;
  border-radius:18px;
  border:none;
  background:#e8eaed;
  cursor:pointer;
  font-size:13px;
  font-weight:500;
}
.filter button.active{
  background:var(--accent);
  color:white;
}

/* GRID */
.container{
  max-width:1200px;
  margin:auto;
  padding:10px 16px 20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
}

/* CARD */
.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:.2s ease;
}
.card:hover{
  box-shadow:0 4px 14px rgba(0,0,0,0.12);
  transform:translateY(-3px);
}

.app-top{
  display:flex;
  gap:12px;
}
.app-icon{
  width:52px;
  height:52px;
  border-radius:12px;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:20px;
}

.card h3{font-size:14px;}
.card p{font-size:12px;opacity:.7;margin-top:3px;}
.install{font-size:11px;opacity:.6;margin-top:4px;}

.badge{margin-top:10px;}
.badge img{
  height:32px;
  transition:.2s ease;
}
.badge img:hover{
  transform:scale(1.05);
}

/* PRIVACY SECTION */
.privacy{
  margin-top:40px;
  background:var(--card);
  padding:30px 16px;
  border-top:1px solid rgba(0,0,0,0.05);
}
.privacy h2{
  font-size:16px;
  margin-bottom:12px;
}
.privacy h3{
  font-size:14px;
  margin-top:14px;
  margin-bottom:6px;
}
.privacy p{
  font-size:13px;
  line-height:1.6;
  margin-bottom:8px;
  opacity:.85;
}

/* FOOTER */
footer{
  margin-top:20px;
  padding:20px;
  text-align:center;
  font-size:13px;
  opacity:.6;
}
</style>
</head>

<body>

<header>
  <h1>OZ Lab</h1>
  <p>Essential Apps. Zero Clutter.</p>
</header>

<div class="top-title">
  <h2>All Apps</h2>
  <p>Fast. Clean. Reliable Android tools.</p>
</div>

<div class="search">
  <input type="text" id="searchInput" placeholder="Search apps...">
</div>

<div class="filter">
  <button class="active" onclick="filterApps(event,'all')">All</button>
  <button onclick="filterApps(event,'media')">Media</button>
  <button onclick="filterApps(event,'tools')">Tools</button>
  <button onclick="filterApps(event,'system')">System</button>
</div>

<div class="container">
  <div class="grid" id="appGrid"></div>
</div>

<footer>
  © 2026 OZ Lab ·
  <a href="https://play.google.com/store/apps/dev?id=6324446257194202838&hl=en_IN" target="_blank">
    Google Play
  </a>
  ·
  <a href="privacy.html">
    Privacy Policy
  </a>
</footer>

<script>
const apps = [
["Only Phone","📞","Minimal dialer & call management","tools","10K+","com.andmobi.phone"],
["Only Gallery","🖼️","Fast photo & video gallery","media","50K+","com.andmobi.gallery"],
["Zero Music","🎵","Lightweight music player","media","10K+","com.vidxlab.music"],
["HD Video Player – Zero","🎬","Smooth HD playback","media","100K+","com.vidxlab.hdplayer"],
["Only Contacts","👤","Simple contact manager","system","10K+","com.andmobi.contacts"],
["Only Home","🏠","Minimal launcher","system","10K+","com.andmobi.home"],
["Only Recorder","🎙️","Clean voice recorder","tools","10K+","com.andmobi.voicerecorder"],
["Only Calculator","🧮","Simple daily calculator","tools","50K+","com.andmobi.math"],
["Only Paint","🎨","Light drawing app","tools","10K+","com.andmobi.paint"],
["Only Messages","💬","Distraction-free messaging","system","10K+","com.andmobi.messages"],
["Only Keyboard","⌨️","Clean typing experience","system","10K+","com.andmobi.keyboard"],
["Only Clock","⏰","Minimal alarm & clock","system","10K+","com.andmobi.clock"],
["Only Notes","📝","Quick notes","tools","10K+","com.andmobi.notes"],
["Only Calendar","📅","Simple planner","system","10K+","com.andmobi.calendar"],
["Only Camera","📷","Fast camera","media","10K+","com.andmobi.camera"],
["Only Music","🎧","Music playback","media","10K+","com.andmobi.music"],
["Only File Manager","📂","File explorer","tools","10K+","com.andmobi.filemanager"],
["Only Play","▶️","Minimal video player","media","10K+","com.andmobi.onlyplay"],
["Only App Locker","🔒","Secure app locking","system","10K+","com.andmobi.applocker"]
];

const grid=document.getElementById("appGrid");

apps.forEach(app=>{
  const card=document.createElement("div");
  card.className="card";
  card.setAttribute("data-name",app[0].toLowerCase());
  card.setAttribute("data-category",app[3]);
  card.innerHTML=`
    <div class="app-top">
      <div class="app-icon">${app[1]}</div>
      <div>
        <h3>${app[0]}</h3>
        <p>${app[2]}</p>
        <div class="install">⬇ ${app[4]} installs</div>
      </div>
    </div>
    <div class="badge">
      <a href="https://play.google.com/store/apps/details?id=${app[5]}" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
      </a>
    </div>
  `;
  grid.appendChild(card);
});

document.getElementById("searchInput").addEventListener("keyup",function(){
  const v=this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.dataset.name.includes(v)?"block":"none";
  });
});

function filterApps(event,cat){
  document.querySelectorAll(".filter button").forEach(btn=>btn.classList.remove("active"));
  event.target.classList.add("active");
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=(cat==="all"||c.dataset.category===cat)?"block":"none";
  });
}
</script>

</body>
</html>
