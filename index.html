<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZ Lab – Android Apps</title>
<meta name="description" content="Official OZ Lab Android apps. Clean. Minimal. Essential.">

<link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>

<style>
:root{
  --accent:#F64C17;
  --bg:#f1f3f4;
  --card:#ffffff;
  --text:#202124;
  --muted:#5f6368;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#f5f5f5;
    --muted:#9aa0a6;
  }
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== HEADER ===== */

.header{
  text-align:center;
  padding:26px 16px 14px;
}

.header h1{
  font-size:26px;
  font-weight:500;
  margin-bottom:14px;
}

/* ===== SEARCH ===== */

.search-section{
  max-width:680px;
  margin:0 auto 12px;
  padding:0 16px;
}

.search-section input{
  width:100%;
  padding:12px 18px;
  border-radius:24px;
  border:1px solid #dadce0;
  background:var(--card);
  font-size:14px;
  outline:none;
  transition:.2s ease;
}

.search-section input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(246,76,23,.12);
}

/* ===== FILTER ===== */

.filter{
  text-align:center;
  margin-bottom:26px;
}

.filter button{
  margin:4px;
  padding:7px 16px;
  border-radius:18px;
  border:none;
  background:#e8eaed;
  font-size:13px;
  cursor:pointer;
  transition:.2s ease;
}

.filter button.active{
  background:var(--accent);
  color:white;
}

/* ===== GRID ===== */

.container{
  max-width:1200px;
  margin:0 auto 60px;
  padding:0 24px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:22px;
}

.card{
  background:var(--card);
  padding:18px;
  border-radius:18px;
  box-shadow:0 3px 10px rgba(0,0,0,.06);
  transition:.2s ease;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.app-top{
  display:flex;
  gap:12px;
}

.app-icon{
  width:58px;
  height:58px;
  border-radius:16px;
  overflow:hidden;
}

.app-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  font-weight:500;
}

.card p{
  font-size:12px;
  color:var(--muted);
  margin-top:3px;
}

.install{
  font-size:12px;
  color:var(--muted);
  margin-top:5px;
}

.badge{
  margin-top:12px;
}

.badge img{
  height:34px;
}

/* ===== FOOTER ===== */

footer{
  text-align:center;
  padding:40px 20px;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <h1>OZ Lab</h1>

  <div class="search-section">
    <input type="text" id="searchInput" placeholder="Search apps...">
  </div>

  <div class="filter">
    <button class="active" data-category="all">All</button>
    <button data-category="media">Media</button>
    <button data-category="tools">Tools</button>
    <button data-category="system">System</button>
  </div>
</div>

<div class="container">
  <div class="grid" id="appGrid"></div>
</div>

<footer>
  © 2026 OZ Lab
</footer>

<script>
const apps = [
["Only Phone","Minimal dialer & call management","tools","10K+","com.andmobi.phone","icons/only-phone.png"],
["Only Gallery","Fast photo & video gallery","media","50K+","com.andmobi.gallery","icons/only-gallery.png"],
["Zero Music","Lightweight music player","media","10K+","com.vidxlab.music","icons/zero-music.png"],
["HD Video Player – Zero","Smooth HD playback","media","100K+","com.vidxlab.hdplayer","icons/hd-player.png"],
["Only Contacts","Simple contact manager","system","10K+","com.andmobi.contacts","icons/only-contacts.png"],
["Only Home","Minimal launcher","system","10K+","com.andmobi.home","icons/only-home.png"],
["Only Recorder","Clean voice recorder","tools","10K+","com.andmobi.voicerecorder","icons/only-recorder.png"],
["Only Calculator","Simple daily calculator","tools","50K+","com.andmobi.math","icons/only-calculator.png"],
["Only Paint","Light drawing app","tools","10K+","com.andmobi.paint","icons/only-paint.png"],
["Only Messages","Distraction-free messaging","system","10K+","com.andmobi.messages","icons/only-messages.png"],
["Only Keyboard","Clean typing experience","system","10K+","com.andmobi.keyboard","icons/only-keyboard.png"],
["Only Clock","Minimal alarm & clock","system","10K+","com.andmobi.clock","icons/only-clock.png"],
["Only Notes","Quick notes","tools","10K+","com.andmobi.notes","icons/only-notes.png"],
["Only Calendar","Simple planner","system","10K+","com.andmobi.calendar","icons/only-calendar.png"],
["Only Camera","Fast camera","media","10K+","com.andmobi.camera","icons/only-camera.png"],
["Only Music","Music playback","media","10K+","com.andmobi.music","icons/only-music.png"],
["Only File Manager","File explorer","tools","10K+","com.andmobi.filemanager","icons/only-filemanager.png"],
["Only Play","Minimal video player","media","10K+","com.andmobi.onlyplay","icons/only-play.png"],
["Only App Locker","Secure app locking","system","10K+","com.andmobi.applocker","icons/only-applocker.png"]
];

const grid = document.getElementById("appGrid");

apps.forEach(app=>{
  const card=document.createElement("div");
  card.className="card";
  card.dataset.name=app[0].toLowerCase();
  card.dataset.category=app[2];

  card.innerHTML=`
    <div class="app-top">
      <div class="app-icon">
        <img src="${app[5]}" loading="lazy">
      </div>
      <div>
        <h3>${app[0]}</h3>
        <p>${app[1]}</p>
        <div class="install">⭐ 4.6 · ⬇ ${app[3]}</div>
      </div>
    </div>
    <div class="badge">
      <a href="https://play.google.com/store/apps/details?id=${app[4]}" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
      </a>
    </div>
  `;

  grid.appendChild(card);
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",e=>{
  const v=e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.dataset.name.includes(v)?"":"none";
  });
});

/* FILTER */
document.querySelectorAll(".filter button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const cat=btn.dataset.category;
    document.querySelectorAll(".card").forEach(c=>{
      c.style.display=(cat==="all"||c.dataset.category===cat)?"":"none";
    });
  });
});
</script>

</body>
</html>
