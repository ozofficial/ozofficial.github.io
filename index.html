<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZ Lab – Android Apps</title>
<meta name="description" content="Official developer page for OZ Lab Android apps. Clean, minimal Android tools.">

<link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>

<style>
:root{
  --accent:#F64C17;
  --bg:#f5f6f7;
  --card:#ffffff;
  --text:#202124;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#111;
    --card:#1e1e1e;
    --text:#f5f5f5;
  }
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

/* HERO */
.hero{
  padding:22px 20px 12px;
  text-align:center;
  background:none; /* remove gradient to reduce visual space */
}

.hero h1{
  font-size:26px;
  font-weight:600;
}

.hero p{
  font-size:13px;
  opacity:.6;
  margin-top:4px;
}

/* SEARCH */
.search{
  max-width:600px;
  margin:12px auto 10px;
}
.search input{
  width:100%;
  padding:14px 18px;
  border-radius:14px;
  border:1px solid #dadce0;
  font-size:15px;
  background:var(--card);
  color:var(--text);
}

/* FILTER */
.filter{
  text-align:center;
  margin-bottom:14px;
}
.filter button{
  margin:5px;
  padding:8px 18px;
  border-radius:22px;
  border:none;
  background:#e8eaed;
  cursor:pointer;
  font-size:14px;
  transition:.2s;
}
.filter button.active{
  background:var(--accent);
  color:#fff;
}

/* GRID */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
}

/* CARD */
.card{
  background:var(--card);
  padding:22px;
  border-radius:22px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:.3s ease;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  opacity:0;
  transform:translateY(15px);
  animation:fadeUp .5s ease forwards;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 14px 35px rgba(0,0,0,0.15);
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

.app-top{
  display:flex;
  gap:16px;
}

/* ICON */
.app-icon{
  width:68px;
  height:68px;
  border-radius:22px;
  background:#fff;
  overflow:hidden;
  flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  position:relative;
}

.app-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity .4s ease;
}

.app-icon.loaded img{opacity:1;}

.fallback{
  display:none;
  font-size:26px;
  color:var(--accent);
  align-items:center;
  justify-content:center;
  height:100%;
}

/* TEXT */
.card h3{
  font-size:17px;
}
.card p{
  font-size:14px;
  opacity:.75;
  margin-top:5px;
}
.install{
  font-size:13px;
  opacity:.6;
  margin-top:6px;
}

/* BADGE */
.badge{
  margin-top:20px;
  height:42px;
  display:flex;
  align-items:center;
}
.badge img{
  height:40px;
  width:auto;
  max-width:160px;
  object-fit:contain;
  display:block;
  transition:.2s ease;
}
.badge img:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  padding:50px 20px;
  text-align:center;
  font-size:14px;
  opacity:.6;
}
footer a{
  color:var(--accent);
  text-decoration:none;
  margin:0 10px;
}
</style>
</head>

<body>

<section class="hero">
  <h1>OZ Lab</h1>
  <p>
OZ Lab builds secure, minimal Android apps focused on core features. Part of the OnlyZero ecosystem—essential apps, zero clutter.</p>
</section>

<div class="search">
  <input type="text" id="searchInput" placeholder="Search apps...">
</div>

<div class="filter">
  <button class="active" data-category="all">All</button>
  <button data-category="media">Media</button>
  <button data-category="tools">Tools</button>
  <button data-category="system">System</button>
</div>

<section class="container">
  <div class="grid" id="appGrid"></div>
</section>

<footer>
  © 2026 OZ Lab ·
  <a href="privacy.html">Privacy</a> ·
  <a href="terms.html">Terms</a> ·
  <a href="support.html">Support</a> ·
  <a href="contact.html">Contact</a>
</footer>

<script>
const apps = [
["Only Phone","📞","Minimal dialer & call management","tools","10K+","com.andmobi.phone","icons/only-phone.png"],
["Only Gallery","🖼️","Fast photo & video gallery","media","50K+","com.andmobi.gallery","icons/only-gallery.png"],
["Zero Music","🎵","Lightweight music player","media","10K+","com.vidxlab.music","icons/zero-music.png"],
["HD Video Player – Zero","🎬","Smooth HD playback","media","100K+","com.vidxlab.hdplayer","icons/hd-player.png"],
["Only Contacts","👤","Simple contact manager","system","10K+","com.andmobi.contacts","icons/only-contacts.png"],
["Only Home","🏠","Minimal launcher","system","10K+","com.andmobi.home","icons/only-home.png"],
["Only Recorder","🎙️","Clean voice recorder","tools","10K+","com.andmobi.voicerecorder","icons/only-recorder.png"],
["Only Calculator","🧮","Simple daily calculator","tools","50K+","com.andmobi.math","icons/only-calculator.png"],
["Only Paint","🎨","Light drawing app","tools","10K+","com.andmobi.paint","icons/only-paint.png"],
["Only Messages","💬","Distraction-free messaging","system","10K+","com.andmobi.messages","icons/only-messages.png"],
["Only Keyboard","⌨️","Clean typing experience","system","10K+","com.andmobi.keyboard","icons/only-keyboard.png"],
["Only Clock","⏰","Minimal alarm & clock","system","10K+","com.andmobi.clock","icons/only-clock.png"],
["Only Notes","📝","Quick notes","tools","10K+","com.andmobi.notes","icons/only-notes.png"],
["Only Calendar","📅","Simple planner","system","10K+","com.andmobi.calendar","icons/only-calendar.png"],
["Only Camera","📷","Fast camera","media","10K+","com.andmobi.camera","icons/only-camera.png"],
["Only Music","🎧","Music playback","media","10K+","com.andmobi.music","icons/only-music.png"],
["Only File Manager","📂","File explorer","tools","10K+","com.andmobi.filemanager","icons/only-filemanager.png"],
["Only Play","▶️","Minimal video player","media","10K+","com.andmobi.onlyplay","icons/only-play.png"],
["Only App Locker","🔒","Secure app locking","system","10K+","com.andmobi.applocker","icons/only-applocker.png"]
];

const grid=document.getElementById("appGrid");

apps.forEach((app,i)=>{
  const card=document.createElement("div");
  card.className="card";
  card.style.animationDelay=i*50+"ms";
  card.dataset.name=app[0].toLowerCase();
  card.dataset.category=app[3];

  card.innerHTML=`
    <div class="app-top">
      <div class="app-icon">
        <img loading="lazy" decoding="async">
        <div class="fallback">${app[1]}</div>
      </div>
      <div>
        <h3>${app[0]}</h3>
        <p>${app[2]}</p>
        <div class="install">⬇ ${app[4]} installs</div>
      </div>
    </div>
    <div class="badge">
      <a href="https://play.google.com/store/apps/details?id=${app[5]}" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
      </a>
    </div>
  `;

  const img=card.querySelector("img");
  const icon=card.querySelector(".app-icon");
  const fallback=card.querySelector(".fallback");

  img.src=app[6];
  img.onload=()=>icon.classList.add("loaded");
  img.onerror=()=>{
    img.remove();
    fallback.style.display="flex";
    icon.classList.add("loaded");
  };

  grid.appendChild(card);
});

document.getElementById("searchInput").addEventListener("input",e=>{
  const v=e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.dataset.name.includes(v)?"":"none";
  });
});

document.querySelectorAll(".filter button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const cat=btn.dataset.category;
    document.querySelectorAll(".card").forEach(c=>{
      c.style.display=(cat==="all"||c.dataset.category===cat)?"":"none";
    });
  });
});
</script>

</body>
</html>
