<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZ Lab – Android Apps</title>
<meta name="description" content="Official developer page for OZ Lab Android applications.">

<link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>

<style>
:root{
  --accent:#F64C17;
  --bg:#f1f3f4;
  --card:#ffffff;
  --text:#202124;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#f5f5f5;
  }
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Roboto,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
}

/* HEADER */
header{
  background:var(--card);
  padding:10px 20px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  position:sticky;
  top:0;
  z-index:1000;
}

header h1{font-size:18px;}
header p{font-size:12px;opacity:.7;margin-top:2px;}

/* TITLE */
.top-title{
  padding:14px 20px 6px;
  text-align:center;
}
.top-title h2{font-size:20px;}
.top-title p{font-size:13px;opacity:.6;margin-top:3px;}

/* SEARCH */
.search{
  max-width:600px;
  margin:8px auto 12px;
}
.search input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #dadce0;
  font-size:14px;
}

/* FILTER */
.filter{
  text-align:center;
  margin-bottom:10px;
}
.filter button{
  margin:4px;
  padding:6px 14px;
  border-radius:18px;
  border:none;
  background:#e8eaed;
  cursor:pointer;
  font-size:13px;
}
.filter button.active{
  background:var(--accent);
  color:#fff;
}

/* GRID */
.container{
  max-width:1200px;
  margin:auto;
  padding:10px 16px 20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
}

/* CARD */
.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:.2s ease;
}
.card:hover{
  box-shadow:0 4px 14px rgba(0,0,0,0.12);
  transform:translateY(-3px);
}

.app-top{
  display:flex;
  gap:12px;
}

/* ICON */
.app-icon{
  width:clamp(48px,5vw,60px);
  height:clamp(48px,5vw,60px);
  border-radius:16px;
  background:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

/* Skeleton */
.app-icon::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    #eee 25%,
    #ddd 50%,
    #eee 75%
  );
  background-size:200% 100%;
  animation:skeleton 1.2s infinite;
}

@keyframes skeleton{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.app-icon.loaded::before{
  display:none;
}

/* Image */
.app-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity .3s ease;
}

.app-icon.loaded img{
  opacity:1;
}

/* Fallback */
.fallback-icon{
  display:none;
  font-size:22px;
  color:var(--accent);
}

.card h3{font-size:14px;}
.card p{font-size:12px;opacity:.7;margin-top:3px;}
.install{font-size:11px;opacity:.6;margin-top:4px;}

.badge{margin-top:10px;}
.badge img{
  height:30px;
  transition:.2s ease;
}
.badge img:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  margin-top:20px;
  padding:20px;
  text-align:center;
  font-size:13px;
  opacity:.6;
}
footer a{
  color:var(--accent);
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h1>OZ Lab</h1>
  <p>Essential Apps. Zero Clutter.</p>
</header>

<div class="top-title">
  <h2>All Apps</h2>
  <p>Fast. Clean. Reliable Android tools.</p>
</div>

<div class="search">
  <input type="text" id="searchInput" placeholder="Search apps...">
</div>

<div class="filter">
  <button class="active" data-category="all">All</button>
  <button data-category="media">Media</button>
  <button data-category="tools">Tools</button>
  <button data-category="system">System</button>
</div>

<div class="container">
  <div class="grid" id="appGrid"></div>
</div>

<footer>
  © 2026 OZ Lab ·
  <a href="privacy.html">Privacy</a> ·
  <a href="terms.html">Terms</a> ·
  <a href="support.html">Support</a> ·
  <a href="contact.html">Contact</a>
</footer>

<script defer>
const apps = [
["Only Phone","📞","Minimal dialer & call management","tools","10K+","com.andmobi.phone","icons/only-phone.png"],
["Only Gallery","🖼️","Fast photo & video gallery","media","50K+","com.andmobi.gallery","icons/only-gallery.png"],
["Zero Music","🎵","Lightweight music player","media","10K+","com.vidxlab.music","icons/zero-music.png"],
["HD Video Player – Zero","🎬","Smooth HD playback","media","100K+","com.vidxlab.hdplayer","icons/hd-player.png"],
["Only Contacts","👤","Simple contact manager","system","10K+","com.andmobi.contacts","icons/only-contacts.png"],
["Only Home","🏠","Minimal launcher","system","10K+","com.andmobi.home","icons/only-home.png"],
["Only Recorder","🎙️","Clean voice recorder","tools","10K+","com.andmobi.voicerecorder","icons/only-recorder.png"],
["Only Calculator","🧮","Simple daily calculator","tools","50K+","com.andmobi.math","icons/only-calculator.png"],
["Only Paint","🎨","Light drawing app","tools","10K+","com.andmobi.paint","icons/only-paint.png"],
["Only Messages","💬","Distraction-free messaging","system","10K+","com.andmobi.messages","icons/only-messages.png"],
["Only Keyboard","⌨️","Clean typing experience","system","10K+","com.andmobi.keyboard","icons/only-keyboard.png"],
["Only Clock","⏰","Minimal alarm & clock","system","10K+","com.andmobi.clock","icons/only-clock.png"],
["Only Notes","📝","Quick notes","tools","10K+","com.andmobi.notes","icons/only-notes.png"],
["Only Calendar","📅","Simple planner","system","10K+","com.andmobi.calendar","icons/only-calendar.png"],
["Only Camera","📷","Fast camera","media","10K+","com.andmobi.camera","icons/only-camera.png"],
["Only Music","🎧","Music playback","media","10K+","com.andmobi.music","icons/only-music.png"],
["Only File Manager","📂","File explorer","tools","10K+","com.andmobi.filemanager","icons/only-filemanager.png"],
["Only Play","▶️","Minimal video player","media","10K+","com.andmobi.onlyplay","icons/only-play.png"],
["Only App Locker","🔒","Secure app locking","system","10K+","com.andmobi.applocker","icons/only-applocker.png"]
];

const grid = document.getElementById("appGrid");

function createCard(app){
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.name = app[0].toLowerCase();
  card.dataset.category = app[3];

  card.innerHTML = `
    <div class="app-top">
      <div class="app-icon">
        <img alt="${app[0]}" loading="lazy" decoding="async">
        <span class="fallback-icon">${app[1]}</span>
      </div>
      <div>
        <h3>${app[0]}</h3>
        <p>${app[2]}</p>
        <div class="install">⬇ ${app[4]} installs</div>
      </div>
    </div>
    <div class="badge">
      <a href="https://play.google.com/store/apps/details?id=${app[5]}" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" loading="lazy">
      </a>
    </div>
  `;

  const img = card.querySelector(".app-icon img");
  const iconContainer = card.querySelector(".app-icon");
  const fallback = card.querySelector(".fallback-icon");

  img.src = app[6];

  img.onload = async () => {
    try { await img.decode(); } catch(e){}
    iconContainer.classList.add("loaded");
  };

  img.onerror = () => {
    img.remove();
    fallback.style.display = "block";
    iconContainer.classList.add("loaded");
  };

  return card;
}

apps.forEach(app => grid.appendChild(createCard(app)));

document.getElementById("searchInput").addEventListener("input", e=>{
  const value = e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.dataset.name.includes(value) ? "" : "none";
  });
});

document.querySelectorAll(".filter button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const category = btn.dataset.category;

    document.querySelectorAll(".card").forEach(card=>{
      card.style.display = (category === "all" || card.dataset.category === category) ? "" : "none";
    });
  });
});
</script>

</body>
</html>
