<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OZ Lab – Android Apps</title>
<meta name="description" content="Official OZ Lab Android apps. Clean. Minimal. Essential.">

<link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>

<style>
:root{
  --accent:#F64C17;
  --bg:#f8f9fa;
  --card:#ffffff;
  --text:#202124;
  --muted:#5f6368;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f0f0f;
    --card:#1c1c1c;
    --text:#f5f5f5;
    --muted:#9aa0a6;
  }
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
}

/* HERO */
.header{
  text-align:center;
  padding:32px 16px 16px;
}

.header h1{
  font-size:28px;
  font-weight:600;
  margin-bottom:18px;
  position:relative;
  display:inline-block;
}

.header h1::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-8px;
  width:44px;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  border-radius:3px;
}

/* SEARCH */
.search-section{
  max-width:720px;
  margin:0 auto 16px;
  padding:0 16px;
}

.search-section input{
  width:100%;
  padding:14px 20px;
  border-radius:18px;
  border:1px solid #dadce0;
  font-size:14px;
  background:var(--card);
  outline:none;
}

.search-section input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(246,76,23,.12);
}

/* FILTER */
.filter{
  text-align:center;
  margin-bottom:60px;
}

.filter button{
  margin:4px;
  padding:8px 20px;
  border-radius:24px;
  border:none;
  background:#e8eaed;
  font-size:13px;
  cursor:pointer;
}

.filter button.active{
  background:var(--accent);
  color:white;
}

/* FEATURED */
.featured{
  max-width:1200px;
  margin:0 auto 80px;
  padding:0 24px;
  position:relative;
}

.featured-track{
  display:flex;
  gap:28px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
}

.featured-track::-webkit-scrollbar{
  display:none;
}

.featured-card{
  flex:0 0 420px;
  scroll-snap-align:center;
  background:var(--card);
  border-radius:28px;
  padding:28px;
  display:flex;
  gap:24px;
  align-items:center;
  box-shadow:0 20px 60px rgba(0,0,0,.08);
  transition:.3s ease;
}

.featured-card:hover{
  transform:translateY(-6px);
  box-shadow:0 24px 70px rgba(246,76,23,.15);
}

.featured-icon{
  width:100px;
  height:100px;
  border-radius:24px;
  overflow:hidden;
}

.featured-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.featured-content h2{
  font-size:20px;
}

.featured-content p{
  font-size:14px;
  color:var(--muted);
  margin-top:6px;
}

.featured-meta{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
}

.featured-btn{
  margin-top:12px;
  padding:8px 16px;
  border-radius:20px;
  background:var(--accent);
  color:white;
  text-decoration:none;
  font-size:13px;
}

/* GRID */
.container{
  max-width:1200px;
  margin:auto;
  padding:0 24px 100px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:30px;
}

.card{
  background:var(--card);
  padding:24px;
  border-radius:22px;
  box-shadow:0 14px 40px rgba(0,0,0,.05);
  transition:.25s ease;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 50px rgba(0,0,0,.12);
}

.app-top{
  display:flex;
  gap:18px;
}

.app-icon{
  width:70px;
  height:70px;
  border-radius:20px;
  overflow:hidden;
}

.app-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.install{
  font-size:13px;
  color:var(--muted);
  margin-top:8px;
}

.badge{
  margin-top:18px;
}

.badge img{height:42px}

footer{
  padding:60px 20px;
  text-align:center;
  font-size:14px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
  <h1>OZ Lab</h1>
  <div class="search-section">
    <input type="text" id="searchInput" placeholder="Search apps...">
  </div>
  <div class="filter">
    <button class="active" data-category="all">All</button>
    <button data-category="media">Media</button>
    <button data-category="tools">Tools</button>
    <button data-category="system">System</button>
  </div>
</div>

<section class="featured">
  <div class="featured-track" id="featuredTrack"></div>
</section>

<div class="container">
  <div class="grid" id="appGrid"></div>
</div>

<footer>
  © 2026 OZ Lab
</footer>

<script>
const apps = [
["Only Phone","Minimal dialer & call management","tools","10K+","com.andmobi.phone","icons/only-phone.png"],
["Only Gallery","Fast photo & video gallery","media","50K+","com.andmobi.gallery","icons/only-gallery.png"],
["Zero Music","Lightweight music player","media","10K+","com.vidxlab.music","icons/zero-music.png"],
["HD Video Player – Zero","Smooth HD playback","media","100K+","com.vidxlab.hdplayer","icons/hd-player.png"],
["Only Contacts","Simple contact manager","system","10K+","com.andmobi.contacts","icons/only-contacts.png"],
["Only Home","Minimal launcher","system","10K+","com.andmobi.home","icons/only-home.png"],
["Only Recorder","Clean voice recorder","tools","10K+","com.andmobi.voicerecorder","icons/only-recorder.png"],
["Only Calculator","Simple daily calculator","tools","50K+","com.andmobi.math","icons/only-calculator.png"],
["Only Paint","Light drawing app","tools","10K+","com.andmobi.paint","icons/only-paint.png"],
["Only Messages","Distraction-free messaging","system","10K+","com.andmobi.messages","icons/only-messages.png"],
["Only Keyboard","Clean typing experience","system","10K+","com.andmobi.keyboard","icons/only-keyboard.png"],
["Only Clock","Minimal alarm & clock","system","10K+","com.andmobi.clock","icons/only-clock.png"],
["Only Notes","Quick notes","tools","10K+","com.andmobi.notes","icons/only-notes.png"],
["Only Calendar","Simple planner","system","10K+","com.andmobi.calendar","icons/only-calendar.png"],
["Only Camera","Fast camera","media","10K+","com.andmobi.camera","icons/only-camera.png"],
["Only Music","Music playback","media","10K+","com.andmobi.music","icons/only-music.png"],
["Only File Manager","File explorer","tools","10K+","com.andmobi.filemanager","icons/only-filemanager.png"],
["Only Play","Minimal video player","media","10K+","com.andmobi.onlyplay","icons/only-play.png"],
["Only App Locker","Secure app locking","system","10K+","com.andmobi.applocker","icons/only-applocker.png"]
];

/* ===== FEATURED (ONLY FIRST 5) ===== */
const featuredTrack = document.getElementById("featuredTrack");
apps.slice(0,5).forEach(app=>{
  const card=document.createElement("div");
  card.className="featured-card";
  card.innerHTML=`
    <div class="featured-icon">
      <img src="${app[5]}" loading="lazy">
    </div>
    <div class="featured-content">
      <h2>${app[0]}</h2>
      <p>${app[1]}</p>
      <div class="featured-meta">⭐ 4.6 · ⬇ ${app[3]}</div>
      <a class="featured-btn"
         href="https://play.google.com/store/apps/details?id=${app[4]}"
         target="_blank">Get it</a>
    </div>
  `;
  featuredTrack.appendChild(card);
});

/* ===== GRID (ALL 19) ===== */
const grid=document.getElementById("appGrid");
apps.forEach(app=>{
  const card=document.createElement("div");
  card.className="card";
  card.dataset.name=app[0].toLowerCase();
  card.dataset.category=app[2];

  card.innerHTML=`
    <div class="app-top">
      <div class="app-icon">
        <img src="${app[5]}" loading="lazy">
      </div>
      <div>
        <h3>${app[0]}</h3>
        <p>${app[1]}</p>
        <div class="install">⭐ 4.6 · ⬇ ${app[3]}</div>
      </div>
    </div>
    <div class="badge">
      <a href="https://play.google.com/store/apps/details?id=${app[4]}" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
      </a>
    </div>
  `;
  grid.appendChild(card);
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",e=>{
  const v=e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.dataset.name.includes(v)?"":"none";
  });
});

/* FILTER */
document.querySelectorAll(".filter button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const cat=btn.dataset.category;
    document.querySelectorAll(".card").forEach(c=>{
      c.style.display=(cat==="all"||c.dataset.category===cat)?"":"none";
    });
  });
});
</script>

</body>
</html>
